name: Deploy to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish dist to gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          npx gh-pages \
            --dist dist \
            --branch gh-pages \
            --dotfiles \
            --user "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>" \
            --repo "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
